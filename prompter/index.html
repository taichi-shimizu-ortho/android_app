<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f77e58">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Prompter">
    <title>Prompter</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="../shared/icons/icon-192.png">
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a1a; padding: 0; margin: 0; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }

        /* 発表コンテンツ */
        .content { width: 100%; max-width: 90vw; text-align: center; }
        .section-title { font-size: 1.8em; font-weight: bold; color: #f77e58; margin-bottom: 20px; }
        .section-text { font-size: 1.4em; line-height: 1.6; color: #fff; margin-bottom: 30px; word-wrap: break-word; }

        /* タイマー */
        .timer-bar { position: fixed; top: 0; left: 0; height: 6px; background: #f77e58; transition: width 0.1s linear; }
        .timer-display { position: fixed; top: 15px; right: 15px; font-size: 1.2em; color: #f77e58; font-weight: bold; }

        /* コントロール */
        .controls { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; gap: 10px; justify-content: center; padding: 0 20px; }
        button { padding: 15px 30px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-prev { background: #555; color: #fff; }
        .btn-prev:active { background: #666; }
        .btn-start { background: #f77e58; color: white; flex: 2; }
        .btn-start:active { background: #e66a48; }
        .btn-next { background: #555; color: #fff; }
        .btn-next:active { background: #666; }

        /* セクション数表示 */
        .section-counter { position: fixed; top: 15px; left: 15px; font-size: 1.1em; color: #999; }
    </style>
</head>
<body>

<div class="timer-bar" id="timerBar"></div>
<div class="timer-display" id="timerDisplay">0:00</div>
<div class="section-counter" id="sectionCounter">0/0</div>

<div class="container">
    <div class="content">
        <div class="section-title" id="sectionTitle"></div>
        <div class="section-text" id="sectionText"></div>
    </div>
</div>

<div class="controls">
    <button class="btn-prev" onclick="previousSection()">← PREV</button>
    <button class="btn-start" id="startBtn" onclick="togglePresentation()">START</button>
    <button class="btn-next" onclick="nextSection()">NEXT →</button>
</div>

<script>
const sections = [
    {
        title: "Introduction",
        duration: 40,
        text: "I am Taichi Shimizu from University of Occupational and Environmental Health, Fukuoka, Japan\n\nI would have presentation about \"Relaxin Family Peptide 1 as a Pathogenic Factor for Femoroacetabular Impingement: Expression in the Murine Hip Joint\""
    },
    {
        title: "Background",
        duration: 40,
        text: "Relaxin is a peptide hormone that binds to relaxin family peptide receptor 1 (RXFP1) and induces relaxation of the pubic ligament through the production of matrix metalloproteinases and collagen degradation.\n\nThis hormone's ligament-relaxing effect may affect the hip joint, particularly in patients with femoroacetabular impingement (FAI).\n\nThe objectives of this study are: To examine sex differences and pregnancy-related variations of RXFP1 in the hip joint, and to investigate the relationship between chondrocyte differentiation and RXFP1 expression."
    },
    {
        title: "Methods",
        duration: 50,
        text: "in vivo study\nMale and female 8-week-old mice and mice at 18 days of gestation were used. RXFP1 expression was examined by RT-PCR, and histological evaluations were performed using HE and MT staining. Immunohistochemistry was performed using antibodies against RXFP1, vimentin, and SOX9.\nBlood samples were collected, and serum relaxin concentrations were measured.\n\nin vitro\nIn experiments using cultured cells, ATDC5 cells were induced to differentiate using ITS as a chondrogenic inducer. Nodule formation was evaluated by Alcian blue staining, and the expression of RXFP1 and SOX9 was examined by Western blotting."
    },
    {
        title: "Results",
        duration: 50,
        text: "First, please look at the top-left panel showing the histological evaluation. As you can see, there were no obvious morphological differences between males and females.\n\nMoving to the top-right panel, immunohistochemical analysis detected RXFP1 expression in both the articular cartilage and the joint capsule. These positive signals are indicated by the black arrowheads.\n\nTo further characterize these cells, we performed double immunostaining, shown in the bottom-left panel. Here, we found that RXFP1 colocalized with vimentin, a mesenchymal cell marker, as well as the chondrocyte marker SOX9.\n\nConsistent with these histological findings, the Western blot results on the bottom-right demonstrate that the expression levels of both RXFP1 and SOX9 increased as the culture period progressed."
    },
    {
        title: "Conclusion",
        duration: 40,
        text: "In this study, we demonstrated:\n\n• RXFP1 expression is localized in the articular cartilage and joint capsule.\n• RXFP1-expressing cells include fibroblasts and chondrocytes.\n• RXFP1 expression is upregulated according to cell differentiation."
    },
    {
        title: "Thank You",
        duration: 20,
        text: "Thank you for your attention."
    }
];

let currentSection = 0;
let timeRemaining = sections[0].duration;
let presentationActive = false;
let timerId = null;
let totalTime = sections.reduce((sum, s) => sum + s.duration, 0);

function renderSection() {
    const section = sections[currentSection];
    document.getElementById('sectionTitle').textContent = section.title;
    document.getElementById('sectionText').textContent = section.text;
    document.getElementById('sectionCounter').textContent = `${currentSection + 1}/${sections.length}`;
    timeRemaining = section.duration;
    updateDisplay();
}

function updateDisplay() {
    const mins = Math.floor(timeRemaining / 60);
    const secs = timeRemaining % 60;
    document.getElementById('timerDisplay').textContent = `${mins}:${String(secs).padStart(2, '0')}`;

    const elapsedTime = sections.slice(0, currentSection).reduce((sum, s) => sum + s.duration, 0) + (sections[currentSection].duration - timeRemaining);
    const progress = (elapsedTime / totalTime) * 100;
    document.getElementById('timerBar').style.width = progress + '%';
}

function togglePresentation() {
    if (presentationActive) {
        clearInterval(timerId);
        presentationActive = false;
        document.getElementById('startBtn').textContent = 'RESUME';
    } else {
        presentationActive = true;
        document.getElementById('startBtn').textContent = 'PAUSE';
        timerId = setInterval(() => {
            timeRemaining--;
            updateDisplay();
            if (timeRemaining <= 0) {
                nextSection();
            }
        }, 1000);
    }
}

function nextSection() {
    if (timerId) clearInterval(timerId);
    presentationActive = false;
    document.getElementById('startBtn').textContent = 'START';
    if (currentSection < sections.length - 1) {
        currentSection++;
        renderSection();
    }
}

function previousSection() {
    if (timerId) clearInterval(timerId);
    presentationActive = false;
    document.getElementById('startBtn').textContent = 'START';
    if (currentSection > 0) {
        currentSection--;
        renderSection();
    }
}

// Service Worker 登録
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    });
}

renderSection();
</script>
</body>
</html>
