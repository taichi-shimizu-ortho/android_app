<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2em;
        }
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .app-card {
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .app-card:active {
            transform: scale(0.95);
        }
        .app-card:hover {
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }
        .app-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .app-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .app-desc {
            font-size: 0.85em;
            color: #666;
        }
        .timer { color: #1a73e8; }
        .prompter { color: #f77e58; }
    </style>
</head>
<body>

<div class="container">
    <h1>📱 Apps</h1>
    <div class="app-grid">
        <a href="./timer/" class="app-card">
            <div class="app-icon timer">⏱️</div>
            <div class="app-title">IHC Timer</div>
            <div class="app-desc">二重染色プロトコルタイマー</div>
        </a>
        <a href="./prompter/" class="app-card">
            <div class="app-icon prompter">🎤</div>
            <div class="app-title">Prompter</div>
            <div class="app-desc">プレゼンテーション補助</div>
        </a>
    </div>
</div>

</body>
</html>
